services:
  - type: web
    name: ma-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # paste your Vercel URL, e.g. https://ma-platform.vercel.app
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
