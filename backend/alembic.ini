# Alembic configuration file
# Run from the backend/ directory:
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]
script_location = alembic

# sqlalchemy.url is set programmatically in alembic/env.py from
# app.core.config.settings — do not set it here to avoid duplicating
# the connection string.

# Revision file naming: timestamp prefix for chronological ordering
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration filenames
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
